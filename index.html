<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Orph</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root, [data-theme="light"] {
    --bg: #f8f7f3; --surface: #fff; --text: #181818; --muted: #9a9690;
    --border: #e6e2db; --placeholder: #c5c0b8; --btn: #181818; --btn-text: #fff;
    --toolbar-bg: #fff; --code-bg: #efece6; --toast-bg: #181818; --toast-color: #fff;
    --hover: #f3f0ea; --tag-bg: #edeae4; --link: #1a6fb3; --shadow: rgba(0,0,0,.06);
  }
  [data-theme="dark"] {
    --bg: #141414; --surface: #1e1e1e; --text: #e8e4dc; --muted: #666;
    --border: #2a2a2a; --placeholder: #444; --btn: #e8e4dc; --btn-text: #141414;
    --toolbar-bg: #1e1e1e; --code-bg: #252525; --toast-bg: #e8e4dc; --toast-color: #141414;
    --hover: #252525; --tag-bg: #252525; --link: #6aaddd; --shadow: rgba(0,0,0,.3);
  }

  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: 'Source Serif 4', Georgia, serif; min-height: 100vh; transition: background .3s, color .3s; }

  header { position: sticky; top: 0; z-index: 200; background: var(--bg); border-bottom: 1px solid var(--border); transition: background .3s, border-color .3s; }
  .header-inner { max-width: 800px; margin: 0 auto; padding: 0 20px; height: 54px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .logo { display: flex; align-items: baseline; gap: 1px; cursor: pointer; user-select: none; text-decoration: none; flex-shrink: 0; }
  .logo-orph { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; transition: color .3s; }
  .logo-orph em { font-style: italic; font-weight: 400; }
  .logo-dot { width: 6px; height: 6px; background: var(--text); border-radius: 50%; margin-left: 3px; margin-bottom: 3px; flex-shrink: 0; transition: background .3s; }
  .header-right { display: flex; align-items: center; gap: 6px; }

  .autosave-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); flex-shrink: 0; transition: background .4s; }
  .autosave-dot.saved { background: #4caf50; }
  .autosave-dot.saving { background: #ff9800; animation: pulse .6s infinite alternate; }
  @keyframes pulse { to { opacity: .3; } }

  .icon-btn { background: none; border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; cursor: pointer; font-size: 14px; color: var(--muted); transition: all .2s; line-height: 1; }
  .icon-btn:hover { border-color: var(--text); color: var(--text); }
  .text-btn { background: none; border: 1px solid var(--border); border-radius: 3px; padding: 5px 11px; cursor: pointer; font-size: 13px; font-family: 'Source Serif 4', serif; color: var(--muted); transition: all .2s; white-space: nowrap; }
  .text-btn:hover { border-color: var(--text); color: var(--text); }

  .author-chip { font-size: 12px; color: var(--muted); cursor: pointer; padding: 3px 0; border-bottom: 1px dashed var(--border); transition: color .2s, border-color .2s; font-family: 'JetBrains Mono', monospace; white-space: nowrap; max-width: 90px; overflow: hidden; text-overflow: ellipsis; }
  .author-chip:hover { color: var(--text); border-color: var(--text); }
  .author-chip.hidden { display: none; }
  .author-input { font-size: 12px; font-family: 'JetBrains Mono', monospace; border: none; border-bottom: 1px solid var(--text); background: transparent; outline: none; color: var(--text); width: 90px; padding: 2px 0; display: none; }
  .author-input.visible { display: block; }

  .btn { font-family: 'Source Serif 4', serif; font-size: 13px; border: none; border-radius: 3px; padding: 7px 16px; cursor: pointer; transition: all .18s; white-space: nowrap; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-outline:hover { border-color: var(--text); color: var(--text); }
  .btn-primary { background: var(--btn); color: var(--btn-text); }
  .btn-primary:hover { opacity: .82; }
  .btn-primary:active { transform: scale(.97); }

  .view { display: none; }
  .view.active { display: block; animation: fadeUp .4s ease both; }

  /* HOME */
  #home-view { max-width: 800px; margin: 0 auto; padding: 48px 20px 100px; }
  .home-hero { text-align: center; margin-bottom: 56px; }
  .home-hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(36px,7vw,58px); font-weight: 700; letter-spacing: -1.5px; margin-bottom: 14px; line-height: 1.1; }
  .home-hero h1 em { font-style: italic; font-weight: 400; }
  .home-hero p { font-size: 16px; color: var(--muted); margin-bottom: 28px; }
  .hero-btn { font-family: 'Playfair Display', serif; font-size: 16px; background: var(--btn); color: var(--btn-text); border: none; border-radius: 4px; padding: 13px 34px; cursor: pointer; transition: opacity .2s; }
  .hero-btn:hover { opacity: .82; }

  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; }
  .refresh-btn { font-size: 12px; font-family: 'JetBrains Mono', monospace; color: var(--muted); cursor: pointer; background: none; border: none; padding: 4px 8px; transition: color .2s; }
  .refresh-btn:hover { color: var(--text); }

  .articles-grid { display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .article-card { background: var(--surface); padding: 18px 20px; cursor: pointer; transition: background .15s; border-bottom: 1px solid var(--border); }
  .article-card:last-child { border-bottom: none; }
  .article-card:hover { background: var(--hover); }
  .ac-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 5px; line-height: 1.3; }
  .ac-preview { font-size: 14px; color: var(--muted); margin-bottom: 8px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .ac-meta { font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; display: flex; gap: 10px; flex-wrap: wrap; }

  .empty-state { text-align: center; padding: 52px 20px; color: var(--muted); font-style: italic; font-size: 15px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); }
  .loading-state { text-align: center; padding: 36px; color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 13px; }

  /* EDITOR */
  #editor-view { max-width: 800px; margin: 0 auto; padding: 48px 20px 100px; }
  .toolbar { display: flex; gap: 2px; padding: 7px 10px; background: var(--toolbar-bg); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 32px; flex-wrap: wrap; align-items: center; box-shadow: 0 1px 4px var(--shadow); transition: background .3s, border-color .3s; }
  .tb-btn { font-size: 13px; font-family: 'Source Serif 4', serif; background: none; border: 1px solid transparent; border-radius: 3px; padding: 4px 9px; cursor: pointer; color: var(--muted); transition: all .15s; line-height: 1.5; }
  .tb-btn:hover { background: var(--border); color: var(--text); }
  .tb-sep { width: 1px; background: var(--border); height: 18px; margin: 0 3px; flex-shrink: 0; }
  .tb-input { font-size: 12px; font-family: 'JetBrains Mono', monospace; border: 1px solid var(--border); border-radius: 3px; padding: 4px 8px; outline: none; color: var(--text); background: var(--bg); width: 175px; display: none; transition: border-color .2s; }
  .tb-input:focus { border-color: var(--text); }
  .tb-input.visible { display: block; }
  .tb-input.yt { width: 200px; }

  #title { font-family: 'Playfair Display', serif; font-size: clamp(26px,5vw,42px); font-weight: 700; line-height: 1.18; border: none; outline: none; width: 100%; background: transparent; color: var(--text); resize: none; overflow: hidden; margin-bottom: 10px; letter-spacing: -0.5px; transition: color .3s; }
  #title::placeholder { color: var(--placeholder); }
  .author-line { font-size: 14px; color: var(--muted); margin-bottom: 6px; }
  .author-line span { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text); }
  .reading-bar { font-size: 12px; color: var(--muted); margin-bottom: 28px; font-family: 'JetBrains Mono', monospace; }

  #editor { font-size: 18px; line-height: 1.8; outline: none; min-height: 260px; color: var(--text); caret-color: var(--text); }
  #editor:empty::before { content: attr(data-placeholder); color: var(--placeholder); pointer-events: none; display: block; }
  #editor h2 { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; margin: 34px 0 12px; }
  #editor h3 { font-family: 'Playfair Display', serif; font-size: 20px; margin: 26px 0 10px; }
  #editor p { margin-bottom: 18px; }
  #editor blockquote { border-left: 3px solid var(--border); padding: 6px 0 6px 20px; color: var(--muted); font-style: italic; margin: 22px 0; }
  #editor ul, #editor ol { padding-left: 28px; margin-bottom: 18px; }
  #editor li { margin-bottom: 5px; }
  #editor a { color: var(--link); text-decoration: underline; text-underline-offset: 3px; }
  #editor img { max-width: 100%; border-radius: 4px; margin: 14px 0; display: block; }
  #editor hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
  #editor code { background: var(--code-bg); border-radius: 3px; padding: 1px 5px; font-size: 15px; font-family: 'JetBrains Mono', monospace; }
  #editor .yt-embed { width: 100%; aspect-ratio: 16/9; border-radius: 6px; margin: 18px 0; border: none; display: block; }

  .shortcuts-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 22px; padding-top: 14px; border-top: 1px solid var(--border); }
  .shortcut { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; display: flex; align-items: center; gap: 3px; }
  .key { background: var(--tag-bg); border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px; font-size: 10px; }

  /* ARTICLE VIEW */
  #article-view { max-width: 800px; margin: 0 auto; padding: 52px 20px 100px; }
  .pub-meta { font-size: 13px; color: var(--muted); margin-bottom: 18px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .pub-meta strong { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text); font-weight: 400; }
  .pub-sep { color: var(--border); }
  .pub-rt, .pub-views { font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  #art-title { font-family: 'Playfair Display', serif; font-size: clamp(26px,5vw,42px); font-weight: 700; line-height: 1.18; letter-spacing: -0.5px; margin-bottom: 36px; }
  #art-body { font-size: 18px; line-height: 1.8; }
  #art-body h2 { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; margin: 34px 0 12px; }
  #art-body h3 { font-family: 'Playfair Display', serif; font-size: 20px; margin: 26px 0 10px; }
  #art-body p { margin-bottom: 18px; }
  #art-body blockquote { border-left: 3px solid var(--border); padding: 6px 0 6px 20px; color: var(--muted); font-style: italic; margin: 22px 0; }
  #art-body ul, #art-body ol { padding-left: 28px; margin-bottom: 18px; }
  #art-body li { margin-bottom: 5px; }
  #art-body a { color: var(--link); text-decoration: underline; text-underline-offset: 3px; }
  #art-body img { max-width: 100%; border-radius: 4px; margin: 14px 0; display: block; }
  #art-body hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
  #art-body code { background: var(--code-bg); border-radius: 3px; padding: 1px 5px; font-size: 15px; font-family: 'JetBrains Mono', monospace; }
  #art-body .yt-embed { width: 100%; aspect-ratio: 16/9; border-radius: 6px; margin: 18px 0; border: none; display: block; }

  .share-bar { display: flex; align-items: center; gap: 10px; margin-top: 48px; padding-top: 20px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .share-lbl { font-size: 13px; color: var(--muted); }
  .share-url { font-size: 12px; font-family: 'JetBrains Mono', monospace; background: var(--tag-bg); padding: 7px 12px; border-radius: 3px; color: var(--text); flex: 1; min-width: 120px; word-break: break-all; cursor: pointer; }
  .copy-btn, .tg-btn { font-size: 12px; padding: 7px 14px; border: none; border-radius: 3px; cursor: pointer; font-family: 'Source Serif 4', serif; transition: all .18s; white-space: nowrap; }
  .copy-btn { background: var(--text); color: var(--btn-text); }
  .copy-btn:hover { opacity: .8; }
  .tg-btn { background: #2aabee; color: #fff; }
  .tg-btn:hover { background: #1a9bd8; }

  /* PUBLISHING OVERLAY */
  .pub-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 400; align-items: center; justify-content: center; }
  .pub-overlay.open { display: flex; }
  .pub-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 36px; text-align: center; max-width: 300px; width: 90%; }
  .pub-box p { font-size: 15px; color: var(--muted); margin-top: 14px; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto; }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer { border-top: 1px solid var(--border); padding: 18px 20px; display: flex; justify-content: center; align-items: center; gap: 6px; }
  .ft { font-size: 12px; color: var(--muted); }
  .ft-link { font-size: 12px; font-family: 'JetBrains Mono', monospace; color: var(--text); text-decoration: none; border-bottom: 1px solid var(--border); transition: border-color .2s; padding-bottom: 1px; }
  .ft-link:hover { border-color: var(--text); }

  .toast { position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(16px); background: var(--toast-bg); color: var(--toast-color); font-size: 13px; font-family: 'Source Serif 4', serif; padding: 9px 22px; border-radius: 20px; opacity: 0; transition: all .28s; pointer-events: none; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  #img-file { display: none; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 520px) {
    .tb-btn { padding: 4px 6px; font-size: 12px; }
    .tb-input { width: 130px; } .tb-input.yt { width: 150px; }
    .logo-orph { font-size: 19px; }
    .header-right { gap: 4px; }
    .btn { padding: 6px 12px; font-size: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" onclick="showView('home')">
      <span class="logo-orph">Or<em>ph</em></span>
      <div class="logo-dot"></div>
    </a>
    <div class="header-right">
      <div class="autosave-dot" id="autosave-dot" title="Auto-save"></div>
      <button class="icon-btn" onclick="toggleTheme()" id="theme-btn">🌑</button>
      <span class="author-chip" id="author-chip" onclick="editAuthor()">@Orion</span>
      <input class="author-input" id="author-input" type="text" placeholder="nome" maxlength="32"
        onblur="saveAuthor()" onkeydown="if(event.key==='Enter')saveAuthor()"/>
      <button class="text-btn" id="btn-new" onclick="newArticle()">+ Novo</button>
      <button class="btn btn-outline" id="btn-edit-art" onclick="showView('editor')" style="display:none">Editar</button>
      <button class="btn btn-primary" id="btn-publish" onclick="publish()" style="display:none">Publicar</button>
    </div>
  </div>
</header>

<!-- HOME -->
<div id="home-view" class="view active">
  <div class="home-hero">
    <h1>Or<em>ph</em><span style="display:inline-block;width:7px;height:7px;background:var(--text);border-radius:50%;margin-left:5px;margin-bottom:7px;vertical-align:middle;"></span></h1>
    <p>Escreva e publique. Simples assim.</p>
    <button class="hero-btn" onclick="newArticle()">Escrever agora</button>
  </div>
  <div class="section-header">
    <div class="section-title">Artigos recentes</div>
    <button class="refresh-btn" onclick="loadArticles()">↻ Atualizar</button>
  </div>
  <div id="articles-container">
    <div class="loading-state">Carregando artigos...</div>
  </div>
</div>

<!-- EDITOR -->
<div id="editor-view" class="view">
  <div class="toolbar">
    <button class="tb-btn" onclick="fmt('bold')" title="Ctrl+B"><b>B</b></button>
    <button class="tb-btn" onclick="fmt('italic')" title="Ctrl+I"><i>I</i></button>
    <button class="tb-btn" onclick="fmt('underline')" title="Ctrl+U"><u>U</u></button>
    <button class="tb-btn" onclick="fmt('strikeThrough')"><s>S</s></button>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="fmtBlock('h2')">H2</button>
    <button class="tb-btn" onclick="fmtBlock('h3')">H3</button>
    <button class="tb-btn" onclick="fmtBlock('p')">¶</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="fmt('insertUnorderedList')">• Lista</button>
    <button class="tb-btn" onclick="fmt('insertOrderedList')">1. Lista</button>
    <button class="tb-btn" onclick="fmtBlock('blockquote')">" Citar</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="fmtCode()">&#60;/&#62;</button>
    <button class="tb-btn" onclick="insertHR()">—</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="toggleTbInput('tb-link-input')" title="Ctrl+K">🔗</button>
    <input class="tb-input" id="tb-link-input" type="url" placeholder="https://..."
      onkeydown="if(event.key==='Enter')insertLink()"/>
    <button class="tb-btn" onclick="toggleTbInput('tb-yt-input')">▶</button>
    <input class="tb-input yt" id="tb-yt-input" type="url" placeholder="URL YouTube..."
      onkeydown="if(event.key==='Enter')insertYouTube()"/>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="document.getElementById('img-file').click()">📷</button>
    <input type="file" id="img-file" accept="image/*" onchange="insertImage(event)"/>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="document.execCommand('undo')">↩</button>
    <button class="tb-btn" onclick="document.execCommand('redo')">↪</button>
  </div>

  <textarea id="title" placeholder="Título" rows="1"
    oninput="autoResize(this); updateStats(); triggerAutoSave()"></textarea>
  <div class="author-line">por <span id="author-display">@Orion</span></div>
  <div class="reading-bar" id="reading-bar">0 min de leitura · 0 palavras</div>
  <div id="editor" contenteditable="true" data-placeholder="Conte sua história..."
    oninput="updateStats(); triggerAutoSave()" onkeydown="handleKey(event)"></div>
  <div class="shortcuts-row">
    <span class="shortcut"><span class="key">Ctrl</span>+<span class="key">B</span> Negrito</span>
    <span class="shortcut"><span class="key">Ctrl</span>+<span class="key">I</span> Itálico</span>
    <span class="shortcut"><span class="key">Ctrl</span>+<span class="key">K</span> Link</span>
    <span class="shortcut"><span class="key">Ctrl</span>+<span class="key">S</span> Salvar</span>
    <span class="shortcut"><span class="key">Ctrl</span>+<span class="key">P</span> Publicar</span>
  </div>
</div>

<!-- ARTICLE -->
<div id="article-view" class="view">
  <div class="pub-meta">
    <strong id="art-author">@Orion</strong>
    <span class="pub-sep">·</span><span id="art-date"></span>
    <span class="pub-sep">·</span><span class="pub-rt" id="art-rt"></span>
    <span class="pub-sep">·</span><span class="pub-views" id="art-views"></span>
  </div>
  <div id="art-title"></div>
  <div id="art-body"></div>
  <div class="share-bar">
    <span class="share-lbl">Link:</span>
    <span class="share-url" id="share-url" onclick="copyUrl()"></span>
    <button class="copy-btn" onclick="copyUrl()">Copiar</button>
    <button class="tg-btn" onclick="shareTg()">✈ Telegram</button>
  </div>
</div>

<div class="pub-overlay" id="pub-overlay">
  <div class="pub-box">
    <div class="spinner"></div>
    <p>Publicando seu artigo...</p>
  </div>
</div>

<footer>
  <span class="ft">Criado por</span>
  <a class="ft-link" href="https://t.me/Guizin16z" target="_blank">@Guizin16z</a>
  <span class="ft">· Orph © 2026</span>
</footer>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
//  ⚠️ SUBSTITUA SUA CHAVE AQUI ABAIXO ⚠️
const SUPABASE_URL = 'https://hurpnmmaqysvxpgykebq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1cnBubW1hcXlzdnhwZ3lrZWJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5OTM1MzIsImV4cCI6MjA4ODU2OTUzMn0.1Jz_fCvIdpavmRIyDp4Ijy_VkfPknEd_KSQmp4QfiyI'; // Cole sua publishable key completa
// ══════════════════════════════════════════

async function sbFetch(path, opts = {}) {
  return fetch(SUPABASE_URL + '/rest/v1/' + path, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || '',
    },
    ...opts
  });
}

// THEME
let theme = localStorage.getItem('orph-theme') || 'light';
applyTheme(theme);
function applyTheme(t) { theme=t; document.documentElement.setAttribute('data-theme',t); document.getElementById('theme-btn').textContent=t==='dark'?'☀️':'🌑'; localStorage.setItem('orph-theme',t); }
function toggleTheme() { applyTheme(theme==='dark'?'light':'dark'); }

// AUTHOR
let authorName = localStorage.getItem('orph-author') || 'Orion';
setAuthorDisplay(authorName);
function setAuthorDisplay(n) { document.getElementById('author-chip').textContent='@'+n; document.getElementById('author-display').textContent='@'+n; }
function editAuthor() { document.getElementById('author-chip').classList.add('hidden'); const i=document.getElementById('author-input'); i.classList.add('visible'); i.value=authorName; i.focus(); i.select(); }
function saveAuthor() { const i=document.getElementById('author-input'); const v=i.value.trim().replace(/[^a-zA-Z0-9_\-\.]/g,'')||'Orion'; authorName=v; localStorage.setItem('orph-author',v); setAuthorDisplay(v); i.classList.remove('visible'); document.getElementById('author-chip').classList.remove('hidden'); }

// VIEW MANAGER
let currentView = 'home';
let currentArticleId = null;
function showView(name, fromHash) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(name+'-view').classList.add('active');
  currentView = name;

  // Se abriu artigo direto pelo link, esconde tudo do header exceto logo e tema
  const directLink = fromHash && name === 'article';
  document.getElementById('btn-new').style.display      = (name==='editor' || directLink) ? 'none' : 'inline-block';
  document.getElementById('btn-edit-art').style.display = (name==='article' && !directLink) ? 'inline-block' : 'none';
  document.getElementById('btn-publish').style.display  = name==='editor' ? 'inline-block' : 'none';
  document.getElementById('author-chip').style.display  = directLink ? 'none' : '';
  document.getElementById('autosave-dot').style.display = directLink ? 'none' : '';

  window.scrollTo({top:0,behavior:'smooth'});
  if (name==='home') history.pushState(null,'',window.location.pathname);
  else if (name==='article'&&currentArticleId) history.pushState(null,'','#'+currentArticleId);
}

function newArticle() {
  currentArticleId=null;
  document.getElementById('title').value='';
  document.getElementById('editor').innerHTML='';
  autoResize(document.getElementById('title'));
  updateStats();
  showView('editor');
}

// LOAD ARTICLES
async function loadArticles() {
  const c = document.getElementById('articles-container');
  c.innerHTML = '<div class="loading-state">Carregando artigos...</div>';
  try {
    const res = await sbFetch('articles?select=id,title,body,author,created_at,views&order=created_at.desc&limit=50');
    if (!res.ok) throw new Error();
    const list = await res.json();
    if (!list.length) { c.innerHTML='<div class="empty-state">Nenhum artigo ainda.<br>Seja o primeiro! ✍️</div>'; return; }
    c.innerHTML = '<div class="articles-grid">'+list.map(a=>{
      const preview = a.body.replace(/<[^>]*>/g,'').slice(0,130);
      const words   = a.body.replace(/<[^>]*>/g,'').split(/\s+/).filter(Boolean).length;
      const mins    = Math.max(1,Math.ceil(words/200));
      const date    = new Date(a.created_at).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
      return `<div class="article-card" onclick="openArticle('${a.id}')">
        <div class="ac-title">${esc(a.title)}</div>
        <div class="ac-preview">${esc(preview)}</div>
        <div class="ac-meta"><span>@${esc(a.author)}</span><span>${date}</span><span>${mins} min</span><span>${a.views||0} views</span></div>
      </div>`;
    }).join('')+'</div>';
  } catch { c.innerHTML='<div class="empty-state">Erro ao carregar. Verifique a conexão.</div>'; }
}

// OPEN ARTICLE
async function openArticle(id, fromHash) {
  try {
    const res = await sbFetch('articles?id=eq.'+id+'&select=*');
    if (!res.ok) throw new Error();
    const [a] = await res.json();
    if (!a) { showToast('Artigo não encontrado'); return; }
    currentArticleId = id;
    const words = a.body.replace(/<[^>]*>/g,'').split(/\s+/).filter(Boolean).length;
    const mins  = Math.max(1,Math.ceil(words/200));
    const date  = new Date(a.created_at).toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
    document.getElementById('art-author').textContent = '@'+a.author;
    document.getElementById('art-date').textContent   = date;
    document.getElementById('art-rt').textContent     = mins+' min de leitura';
    document.getElementById('art-views').textContent  = (a.views||0)+' views';
    document.getElementById('art-title').textContent  = a.title;
    document.getElementById('art-body').innerHTML     = a.body;
    document.getElementById('share-url').textContent  = window.location.origin+window.location.pathname+'#'+id;
    showView('article', fromHash);
    sbFetch('articles?id=eq.'+id, {method:'PATCH', prefer:'return=minimal', body:JSON.stringify({views:(a.views||0)+1})});
  } catch { showToast('Erro ao abrir artigo'); }
}

// PUBLISH
async function publish() {
  const title = document.getElementById('title').value.trim();
  const body  = document.getElementById('editor').innerHTML.trim();
  if (!title && !body) { showToast('Escreva algo antes de publicar 😉'); return; }
  document.getElementById('pub-overlay').classList.add('open');
  const id = Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  try {
    const res = await sbFetch('articles', {method:'POST', prefer:'return=minimal', body:JSON.stringify({id,title:title||'Sem título',body:body||'',author:authorName})});
    document.getElementById('pub-overlay').classList.remove('open');
    if (!res.ok) throw new Error(await res.text());
    localStorage.setItem('orph-draft-title',''); localStorage.setItem('orph-draft-body','');
    setDot('saved'); showToast('Publicado! 🎉');
    await openArticle(id);
    loadArticles();
  } catch(e) { document.getElementById('pub-overlay').classList.remove('open'); showToast('Erro ao publicar. Tente novamente.'); console.error(e); }
}

// FORMATTING
function fmt(cmd) { document.getElementById('editor').focus(); document.execCommand(cmd,false,null); }
function fmtBlock(tag) { document.getElementById('editor').focus(); document.execCommand('formatBlock',false,tag); }
function fmtCode() { const sel=window.getSelection(); if(!sel.rangeCount||sel.isCollapsed)return; try{sel.getRangeAt(0).surroundContents(document.createElement('code'));}catch(e){} }
function insertHR() { document.getElementById('editor').focus(); document.execCommand('insertHTML',false,'<hr/>'); }
function toggleTbInput(id) { ['tb-link-input','tb-yt-input'].forEach(i=>{if(i!==id)document.getElementById(i).classList.remove('visible');}); const inp=document.getElementById(id); inp.classList.toggle('visible'); if(inp.classList.contains('visible'))inp.focus(); }
function insertLink() { const i=document.getElementById('tb-link-input'); const u=i.value.trim(); if(!u)return; document.getElementById('editor').focus(); document.execCommand('createLink',false,u); i.value=''; i.classList.remove('visible'); showToast('Link inserido!'); }
function insertYouTube() { const i=document.getElementById('tb-yt-input'); const u=i.value.trim(); if(!u)return; const m=u.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/); if(!m){showToast('URL inválida ⚠️');return;} document.getElementById('editor').focus(); document.execCommand('insertHTML',false,`<iframe class="yt-embed" src="https://www.youtube.com/embed/${m[1]}" allowfullscreen loading="lazy"></iframe>`); i.value=''; i.classList.remove('visible'); showToast('Vídeo inserido ▶'); }
function insertImage(e) { const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=ev=>{document.getElementById('editor').focus();document.execCommand('insertHTML',false,`<img src="${ev.target.result}" alt=""/>`)}; r.readAsDataURL(f); e.target.value=''; }
function handleKey(e) { if(e.key==='Tab'){e.preventDefault();document.execCommand('insertHTML',false,'&nbsp;&nbsp;&nbsp;&nbsp;');} }

// KEYBOARD SHORTCUTS
document.addEventListener('keydown',e=>{
  if(e.ctrlKey||e.metaKey){
    if(e.key==='k'||e.key==='K'){e.preventDefault();toggleTbInput('tb-link-input');}
    if(e.key==='s'||e.key==='S'){e.preventDefault();saveDraft();showToast('Rascunho salvo ✓');setDot('saved');}
    if(e.key==='p'||e.key==='P'){e.preventDefault();publish();}
  }
  if(e.key==='Escape'&&currentView!=='home')showView('home');
});

// TITLE
function autoResize(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}
document.getElementById('title').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();document.getElementById('editor').focus();}});

// STATS
function updateStats(){const txt=(document.getElementById('title').value+' '+(document.getElementById('editor').innerText||'')).trim();const w=txt?txt.split(/\s+/).filter(Boolean).length:0;const m=Math.max(1,Math.ceil(w/200));document.getElementById('reading-bar').textContent=`${m} min de leitura · ${w} palavra${w!==1?'s':''}`;}

// AUTO-SAVE
let saveTimer=null;
function setDot(s){const d=document.getElementById('autosave-dot');d.classList.remove('saved','saving');if(s)d.classList.add(s);}
function saveDraft(){localStorage.setItem('orph-draft-title',document.getElementById('title').value);localStorage.setItem('orph-draft-body',document.getElementById('editor').innerHTML);}
function triggerAutoSave(){setDot('saving');clearTimeout(saveTimer);saveTimer=setTimeout(()=>{saveDraft();setDot('saved');},1200);}
(function(){const t=localStorage.getItem('orph-draft-title');const b=localStorage.getItem('orph-draft-body');if(t){document.getElementById('title').value=t;autoResize(document.getElementById('title'));}if(b)document.getElementById('editor').innerHTML=b;updateStats();if(t||b)setDot('saved');})();

// SHARE
function copyUrl(){const u=document.getElementById('share-url').textContent;navigator.clipboard.writeText(u).then(()=>showToast('Link copiado!')).catch(()=>{const el=Object.assign(document.createElement('textarea'),{value:u});document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);showToast('Link copiado!');});}
function shareTg(){const t=document.getElementById('art-title').textContent||'Artigo';const u=document.getElementById('share-url').textContent;window.open(`https://t.me/share/url?url=${encodeURIComponent(u)}&text=${encodeURIComponent(t+' — via Orph')}`,'_blank');}

// HASH / DEEP LINK
function checkHash(){const h=window.location.hash.slice(1);if(h)openArticle(h, true);}
window.addEventListener('popstate',checkHash);

// HELPERS
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}

// INIT
loadArticles();
checkHash();
</script>
</body>
